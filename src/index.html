<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>trafmon</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="widget" data-theme="dark">
    <!-- Compact 2-line speed display -->
    <div id="net-display">
      <div class="net-row">
        <svg class="arrow" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 3 L21 13 H15.5 V21 H8.5 V13 H3 Z" />
        </svg>
        <span class="speed" id="upload-speed">0.0 KB/s</span>
      </div>
      <div class="net-row">
        <svg class="arrow" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 21 L3 11 H8.5 V3 H15.5 V11 H21 Z" />
        </svg>
        <span class="speed" id="download-speed">0.0 KB/s</span>
      </div>
    </div>

    <!-- Hover-expand process + interface panel -->
    <div id="process-panel">
      <div class="proc-section">
        <div class="proc-title">CPU</div>
        <div id="cpu-list"></div>
      </div>
      <div class="proc-section">
        <div class="proc-title">MEM</div>
        <div id="mem-list"></div>
      </div>
      <div class="proc-section">
        <div class="proc-title">网卡</div>
        <div id="iface-list"></div>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
